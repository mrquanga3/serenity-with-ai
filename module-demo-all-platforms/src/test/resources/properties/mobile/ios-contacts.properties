## iOS Contacts app locators
ios.contacts.addButton = xpath://XCUIElementTypeButton[@name="Add"]
ios.contacts.searchField = xpath://XCUIElementTypeSearchField[@name="Search"]
ios.contacts.contactList = xpath://XCUIElementTypeTable
ios.contacts.firstContact = xpath:(//XCUIElementTypeCell)[1]
ios.contacts.firstNameField = xpath://XCUIElementTypeTextField[@name="First name"]
ios.contacts.lastNameField = xpath://XCUIElementTypeTextField[@name="Last name"]
ios.contacts.doneButton = xpath://XCUIElementTypeButton[@name="Done"]
ios.contacts.cancelButton = xpath://XCUIElementTypeButton[@name="Cancel"]
